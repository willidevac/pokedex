<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse and inspect Pokémon in a modern Pokédex."
    />
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <title>Pokédex Live Console</title>
  </head>

  <body>
    <div class="page-shell">
      <header class="header">
        <div class="header__top">
          <a class="brand" href="#" aria-label="Pokédex home">
            <span class="brand__icon" aria-hidden="true"></span>
            <span>
              <strong>Pokédex</strong>
              <small>Live Console</small>
            </span>
          </a>

          <div class="status" aria-label="Connection status">
            <span class="status__light" aria-hidden="true"></span>
            <span>Gen I archive online</span>
          </div>
        </div>

        <form id="search-form" class="search" aria-label="Search Pokémon">
          <label class="sr-only" for="search-input">Search Pokémon name</label>
          <input
            id="search-input"
            data-id="search-input"
            type="search"
            placeholder="Search Pokémon name..."
            minlength="3"
          />
          <button
            id="search-button"
            data-id="search-button"
            type="submit"
            disabled
          >
            Scan index
          </button>
          <small>Minimum 3 characters</small>
        </form>
      </header>

      <main class="main-content" data-id="content">
        <section class="intro">
          <div>
            <p class="eyebrow">Trainer database / Generation I</p>
            <h1>Who are you scanning?</h1>
            <p class="intro__text">
              Search or browse the original 151 Pokémon.
            </p>
          </div>
        </section>

        <section class="pokemon-section" aria-labelledby="pokemon-heading">
          <div class="section-heading">
            <h2 id="pokemon-heading">Generation I specimens</h2>
            <span id="visible-count">0 visible / Gen I</span>
          </div>

          <div class="pokemon-grid" id="pokemon-grid"></div>

          <button
            id="load-more-button"
            class="load-more-button"
            data-id="load-more-button"
            type="button"
          >
            <strong>Load 20 more entries</strong>
            <small>Up to #0151 · cache enabled</small>
          </button>
        </section>
      </main>
    </div>

    <dialog id="pokemon-dialog" class="pokemon-dialog" data-id="dialog">
      <article class="dialog-card" data-id="overlay-pokemon-name">
        <button
          id="close-dialog-button"
          class="dialog-card__close"
          data-id="close-dialog-button"
          type="button"
          aria-label="Close Pokémon details"
        >
          ×
        </button>
        <div id="dialog-content"></div>
      </article>
    </dialog>

    <script src="./assets/scripts/api.js"></script>
    <script src="./assets/scripts/templates.js"></script>
    <script src="./assets/scripts/script.js"></script>
  </body>
</html>
